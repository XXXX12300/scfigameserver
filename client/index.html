<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mech Warfare TDS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        #gameCanvas {
            display: block;
        }
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <!-- HUD, Minimap, and Scoreboard will go here -->
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
