<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mech Warfare TDS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        #gameCanvas {
            display: block;
        }
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* --- Main Menu UI --- */
        #mainMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(10,20,40,0.9) 0%, rgba(5,5,10,1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }
        #mainMenu h1 {
            font-size: 4rem;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        #playButton {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.2);
        }
        #playButton:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 30px #0ff;
        }
        #statusText {
            margin-top: 20px;
            color: #aaa;
            font-size: 1.2rem;
        }

        /* --- Killfeed UI --- */
        #killfeed {
            position: absolute;
            top: 20px;
            right: 250px; /* offset from minimap */
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            pointer-events: none;
        }
        .feed-item {
            background: rgba(0, 0, 0, 0.6);
            border-left: 3px solid #fff;
            padding: 5px 15px;
            font-size: 14px;
            font-weight: bold;
            animation: fadeinout 4s forwards;
            white-space: nowrap;
        }
        .feed-blue { color: #4a90e2; border-left-color: #4a90e2; }
        .feed-red { color: #e24a4a; border-left-color: #e24a4a; }
        
        @keyframes fadeinout {
            0% { opacity: 0; transform: translateX(20px); }
            10% { opacity: 1; transform: translateX(0); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* --- Scoreboard UI --- */
        #scoreboard {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            background: rgba(10, 20, 40, 0.85);
            border: 2px solid #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            display: none; /* hidden by default */
            flex-direction: column;
            padding: 20px;
            z-index: 50;
        }
        #scoreboard h2 {
            text-align: center;
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 10px;
        }
        .scoreboard-teams {
            display: flex;
            gap: 20px;
        }
        .team-col {
            flex: 1;
        }
        .team-title-blue { color: #4a90e2; border-bottom: 2px solid #4a90e2; padding-bottom: 5px;}
        .team-title-red { color: #e24a4a; border-bottom: 2px solid #e24a4a; padding-bottom: 5px;}
        .player-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: monospace;
            font-size: 16px;
        }
        .player-row:nth-child(even) { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div id="mainMenu">
        <h1>TITANFALL 2D</h1>
        <button id="playButton">DEPLOY</button>
        <div id="statusText">Disconnected</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div id="killfeed"></div>
        
        <div id="scoreboard">
            <h2>Combat Record</h2>
            <div class="scoreboard-teams">
                <div class="team-col" id="sb-blue">
                    <h3 class="team-title-blue">Blue Team</h3>
                    <!-- players injected here -->
                </div>
                <div class="team-col" id="sb-red">
                    <h3 class="team-title-red">Red Team</h3>
                    <!-- players injected here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
